<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>hello-i18n</title>
    <style>
      body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
             padding: 24px; background: #f4f4f4; color: #222; }
      h1 { margin-top: 0; }
      button { padding: 8px 14px; font-size: 1em; margin-right: 8px; cursor: pointer; }
      #greeting { margin-top: 16px; font-size: 1.4em; min-height: 1.6em; }
    </style>
    <script src="js/i18n.js"></script>
</head>
<body>
    <!-- Every visible string carries a data-i18n attribute. The
         server merges i18n/en.json + i18n/ja.json into the global
         dict at startup; the walker in i18n.js applies the active
         language after fetch. -->
    <h1 data-i18n="hello-i18n.title">Hello, i18n!</h1>
    <p data-i18n="hello-i18n.intro">This is a sample FabMo app demonstrating the per-app translation convention.</p>
    <button id="greet" data-i18n="hello-i18n.buttons.greet"
            data-i18n-title="hello-i18n.tooltips.greet"
            title="Click to render a greeting in the active language">Greet me</button>
    <button id="reset" data-i18n="hello-i18n.buttons.reset">Reset</button>
    <div id="greeting"></div>

    <script>
      // JS-injected text uses window.t() with the same dotted-path keys.
      var $greeting = document.getElementById("greeting");
      document.getElementById("greet").addEventListener("click", function () {
        $greeting.textContent = window.t("hello-i18n.greeting");
      });
      document.getElementById("reset").addEventListener("click", function () {
        $greeting.textContent = "";
      });
    </script>
</body>
</html>
